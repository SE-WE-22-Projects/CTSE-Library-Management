name: Node.js CI
on:
  push:
    branches: ["main"]
    paths:
      - "services/**"
  pull_request:
    branches: ["main"]
    paths:
      - "services/**"
  workflow_dispatch:

jobs:
  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_directories: ${{ steps.set-output.outputs.changed_directories }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_max_depth: 2
          json: true
          quotepath: false
          files: services/*/**
      - name: "Set output in the matrix format"
        id: set-output
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            dirs=$(find services -mindepth 1 -maxdepth 1 -type d | jq -R -s -c '[split("\n")[] | select(length > 0)]')
            echo "changed_directories={\"dir\":$dirs}" >> "$GITHUB_OUTPUT"
          else
            echo "changed_directories={\"dir\":${{ steps.changed-files.outputs.all_changed_files }}}" >> "$GITHUB_OUTPUT"
          fi
  build:
    runs-on: ubuntu-latest
    needs:
      - detect-changed-services
    if: ${{ needs.detect-changed-services.outputs.changed_directories != '{"dir":[]}' }}
    strategy:
      fail-fast: true
      matrix: ${{fromJson(needs.detect-changed-services.outputs.changed_directories)}}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          cache: true
          cache_dependency_path: ./services/pnpm-lock.yaml
          version: 10
          run_install: |
            - recursive: true
            - cwd: ./services
            
      - run: pnpm lint
        working-directory: ${{ matrix.dir }}
      - run: pnpm test
        working-directory: ${{ matrix.dir }}
