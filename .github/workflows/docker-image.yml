name: Build Images & Deploy System

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        type: boolean
        required: true
        default: false
      deploy:
        description: "Deploy images to Azure"
        type: boolean
        required: true
        default: false

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags
      - name: Get Tag or Hash
        id: get_version
        run: |
          VERSION=$(git describe --tags --always)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Running for version: $VERSION"
          
  build-and-push:
    runs-on: ubuntu-latest
    needs: get-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: book-service
            dir: services/book-service
            azure_profile: BOOK_SERVICE_AZURE_PUBLISH_PROFILE
            azure_app_name: as-book-service

          - name: user-service
            dir: services/user-service
            azure_profile: USER_SERVICE_AZURE_PUBLISH_PROFILE
            azure_app_name: as-user-service

          - name: notification-service
            dir: services/notification-service
            azure_profile: NOTIFICATION_SERVICE_AZURE_PUBLISH_PROFILE
            azure_app_name: as-notification-service

          - name: lending-service
            dir: services/lending-service
            azure_profile: LENDING_SERVICE_AZURE_PUBLISH_PROFILE
            azure_app_name: as-lending-service

          - name: frontend
            dir: frontend
            azure_profile: WEB_UI_AZURE_PUBLISH_PROFILE
            azure_app_name: as-web-ui

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get Tag or Hash
        id: get_version
        run: |
          VERSION=$(git describe --tags --always)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          push: ${{ inputs.push_images || true }}
          tags: ghcr.io/se-we-22-projects/${{ matrix.name }}:${{needs.get-tag.outputs.version}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Deploy to azure
        if: ${{ matrix.azure_app_name != '' &&  matrix.azure_profile != '' &&  (inputs.push_images || true) }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ matrix.azure_app_name }}
          publish-profile: ${{ secrets[matrix.azure_profile] }}
          images: ghcr.io/se-we-22-projects/${{ matrix.name }}:${{needs.get-tag.outputs.version}}
          app-settings: |
            -DOCKER_REGISTRY_SERVER_USERNAME ${{ secrets.GHCR_USERNAME }}
            -DOCKER_REGISTRY_SERVER_PASSWORD ${{ secrets.GHCR_TOKEN }}
