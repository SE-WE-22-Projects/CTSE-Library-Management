name: Build Images & Deploy System

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        type: boolean
        required: true
        default: false
      deploy:
        description: "Deploy images to Azure"
        type: boolean
        required: true
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: book-service
            dir: services/book-service

          - name: user-service
            dir: services/user-service

          - name: notification-service
            dir: services/notification-service

          - name: lending-service
            dir: services/lending-service
            azure_profile: AZURE_WEBAPP_PUBLISH_PROFILE
            azure_app_name: as-lending

          - name: frontend
            dir: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          push: ${{ inputs.push_images || true }}
          tags: ghcr.io/se-we-22-projects/${{ matrix.name }}:${{github.ref_name}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Deploy to azure
        if: ${{ matrix.azure_app_name != '' &&  matrix.azure_profile != '' &&  (inputs.push_images || true) }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ matrix.azure_app_name }}
          publish-profile: ${{ secrets[matrix.azure_profile] }}
          images: ghcr.io/se-we-22-projects/${{ matrix.name }}:${{github.ref_name}}
          app-settings: |
            -DOCKER_REGISTRY_SERVER_USERNAME ${{ secrets.GHCR_USERNAME }}
            -DOCKER_REGISTRY_SERVER_PASSWORD ${{ secrets.GHCR_TOKEN }}
