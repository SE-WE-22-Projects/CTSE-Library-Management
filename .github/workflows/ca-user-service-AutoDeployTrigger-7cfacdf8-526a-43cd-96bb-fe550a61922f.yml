name: Trigger auto deployment for ca-user-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-user-service-AutoDeployTrigger-7cfacdf8-526a-43cd-96bb-fe550a61922f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAUSERSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAUSERSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAUSERSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/services/user-service
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ctselibrarymanagement.azurecr.io
          registryUsername: ${{ secrets.CAUSERSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAUSERSERVICE_REGISTRY_PASSWORD }}
          containerAppName: ca-user-service
          resourceGroup: rg-ctse-library-management
          imageToBuild: ctselibrarymanagement.azurecr.io/ca-user-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


