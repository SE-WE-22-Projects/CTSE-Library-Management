name: Trigger auto deployment for ca-gateway

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - ".github/workflows/ca-gateway-AutoDeployTrigger-539d0f38-1dac-42ac-8c3c-a520817fe04f.yml"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAGATEWAY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAGATEWAY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAGATEWAY_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}gateway
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ctselibrarymanagement.azurecr.io
          registryUsername: ${{ secrets.CAGATEWAY_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAGATEWAY_REGISTRY_PASSWORD }}
          containerAppName: ca-gateway
          resourceGroup: rg-ctse-library-management
          imageToBuild: ctselibrarymanagement.azurecr.io/ca-gateway:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_
