events {}

http {
    include   mime.types;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;


        # Critical API Gateway production settings
        client_max_body_size 50M;                  # Allow large uploads (e.g. images)
        proxy_read_timeout 300s;                   # Prevent 504 Gateway Timeout on slow queries
        proxy_connect_timeout 300s;

        # Buffers to prevent "upstream sent too big header" with Azure/JWTs
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 16k;

        # Crucial for Azure Container Apps Envoy Proxy (requires HTTP/1.1)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Crucial for routing to Azure Container Apps (which rely on SNI)
        proxy_ssl_server_name on;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Handle client-side routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host ${BACKEND_URL};
            proxy_pass  https://${BACKEND_URL};
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        # add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
