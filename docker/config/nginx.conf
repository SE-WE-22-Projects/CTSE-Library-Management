events {}

http {
    upstream user_service {
        server keycloak:3003;
    }

    upstream book_service {
        server book_service:3001;
    }

    upstream game_service {
        server game_service:8004;
    }

    server {
        listen 80;

        # Auth service
        location /api/auth/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
        }

        # Book service
        location /api/book/ {
            proxy_pass http://book_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        # WebSocket game service
        location /api/ws/ {
            proxy_pass http://game_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
    }
}
