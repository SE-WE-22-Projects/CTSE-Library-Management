events {}

http {

    upstream lending_service {
        server lending_service:3000;
    }

    upstream book_service {
        server book_service:3001;
    }

    upstream user_service {
        server user_service:3002;
    }

    upstream notification_service {
        server notification_service:3003;
    }


    server {
        listen 80;

        location = /_internal/validate_token {
          internal;

          proxy_pass              http://user_service/api/auth/validate;
          proxy_pass_request_body off;
          proxy_set_header        Content-Length   "";
          proxy_set_header        X-Original-URI   $request_uri;
          proxy_set_header        X-Original-Method $request_method;

          proxy_set_header        Authorization   $http_authorization;
        }

        location /api/auth/ {
          proxy_pass http://user_service/api/auth/ ;
        }

        #  Protected

        location /api/users/ {
          auth_request /_internal/validate_token;

          proxy_pass http://user_service;

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }


        location /api/books/ {
          auth_request /_internal/validate_token;

          proxy_pass http://book_service;

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

         location /api/notification/ {
          auth_request /_internal/validate_token;

          proxy_pass http://notification_service;

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

        location /api/lending/ {
          auth_request /_internal/validate_token;

          proxy_pass http://lending_service;

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

        location @unauthorized {
          default_type application/json;
          return 401 '{"error":"Unauthorized","message":"A valid Bearer token is required."}';
        }

        location @forbidden {
          default_type application/json;
          return 403 '{"error":"Forbidden","message":"You do not have permission to access this resource."}';
        }


    }
}
