events {}

http {
    limit_req_zone $binary_remote_addr zone=per_ip_global:10m rate=10r/s;

    server {
        listen 80;

        limit_req zone=per_ip_global burst=20 nodelay;
        limit_req_status 429;

        # Critical API Gateway production settings
        client_max_body_size 50M;                  # Allow large uploads (e.g. images)
        proxy_read_timeout 300s;                   # Prevent 504 Gateway Timeout on slow queries
        proxy_connect_timeout 300s;

        # Buffers to prevent "upstream sent too big header" with Azure/JWTs
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 16k;

        # Crucial for Azure Container Apps Envoy Proxy (requires HTTP/1.1)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Crucial for routing to Azure Container Apps (which rely on SNI)
        proxy_ssl_server_name on;

        location = /_internal/validate_token {
          internal;

          proxy_pass              https://${USER_SERVICE_URL}/api/auth/validate;
          proxy_pass_request_body off;
          proxy_set_header        Content-Length   "";
          proxy_set_header        X-Original-URI   $request_uri;
          proxy_set_header        X-Original-Method $request_method;
          proxy_ssl_server_name on;
          proxy_set_header        Authorization   $http_authorization;
        }

        location /api/auth/ {
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host ${USER_SERVICE_URL};
          proxy_ssl_server_name on;
          proxy_pass  https://${USER_SERVICE_URL}/api/auth/ ;
        }

        #  Protected

        location /api/users/ {
          auth_request /_internal/validate_token;

          proxy_ssl_server_name on;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host ${USER_SERVICE_URL};
          proxy_pass  https://${USER_SERVICE_URL};

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }


        location /api/books/ {
          auth_request /_internal/validate_token;

          proxy_ssl_server_name on;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host ${BOOK_SERVICE_URL};
          proxy_pass  https://${BOOK_SERVICE_URL};

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

         location /api/notification/ {
          auth_request /_internal/validate_token;

          proxy_ssl_server_name on;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host ${NOTIFICATION_SERVICE_URL};
          proxy_pass  https://${NOTIFICATION_SERVICE_URL};

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

        location /api/lendings/ {
          auth_request /_internal/validate_token;

          proxy_ssl_server_name on;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host ${LENDING_SERVICE_URL};
          proxy_pass  https://${LENDING_SERVICE_URL};

          error_page 401 = @unauthorized;
          error_page 403 = @forbidden;
        }

        location @unauthorized {
          default_type application/json;
          return 401 '{"error":"Unauthorized","message":"A valid Bearer token is required."}';
        }

        location @forbidden {
          default_type application/json;
          return 403 '{"error":"Forbidden","message":"You do not have permission to access this resource."}';
        }


    }
}
